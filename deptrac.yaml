deptrac:
  paths:
    - ./src
  exclude_files:
    - '#.*\/vendor\/.*#'
  layers:
    - name: Domain
      collectors:
        - type: classLike
          value: .*Domain.*
    - name: Application
      collectors:
        - type: classLike
          value: .*Application.*
    - name: Infrastructure
      collectors:
        - type: classLike
          value: .*Infrastructure.*
    - name: Framework
      collectors:
        - type: classLike
          value: .*Illuminate.*
    - name: Database
      collectors:
        - type: classLike
          value: .*Database\\Factories.*
  ruleset:
    Domain: []
    Application:
      - Domain
    Infrastructure:
      - Domain
      - Application
      - Framework
      - Database
    Framework: []
    Database: []
